name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{
              "commands": [
                "#!/bin/bash",
                "set -e",
                "",
                "# Clone or update repository",
                "if [ -d \"/home/ubuntu/DailyJournal/.git\" ]; then",
                "  cd /home/ubuntu/DailyJournal",
                "  git checkout main",
                "  git fetch origin main",
                "  git reset --hard origin/main",
                "  git clean -fd",
                "else",
                "  cd /home/ubuntu",
                "  git clone https://github.com/${{ github.repository }}.git DailyJournal",
                "fi",
                "",
                "# Build Docker image",
                "cd /home/ubuntu/DailyJournal",
                "docker build -t dailyjournal:latest .",
                "",
                "# Stop and remove old container",
                "docker stop dailyjournal 2>/dev/null || true",
                "docker rm dailyjournal 2>/dev/null || true",
                "",
                "# Run new container",
                "docker run -d \\",
                "  --name dailyjournal \\",
                "  --restart always \\",
                "  -p 3000:3000 \\",
                "  --env-file backend/.env \\",
                "  dailyjournal:latest",
                "",
                "# Restart Nginx",
                "sudo systemctl restart nginx",
                "",
                "# Cleanup old images",
                "docker image prune -f"
              ]
            }' \
            --comment "Deploy from GitHub Actions" \
            --output text