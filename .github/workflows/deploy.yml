name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{
              "commands": [
                "#!/bin/bash",
                "set -e",
                "",
                "echo \"=========================================\"",
                "echo \"🚀 Starting Deployment at $(date)\"",
                "echo \"=========================================\"",
                "",
                "# Clone or update repository",
                "if [ -d \"/home/ubuntu/DailyJournal/.git\" ]; then",
                "  echo \"📁 Repository exists, updating...\"",
                "  cd /home/ubuntu/DailyJournal",
                "  git checkout main",
                "  git fetch origin main",
                "  git reset --hard origin/main",
                "  git clean -fd",
                "  echo \"✅ Updated to: $(git log -1 --oneline)\"",
                "else",
                "  echo \"📁 Cloning fresh repository...\"",
                "  cd /home/ubuntu",
                "  git clone https://github.com/${{ github.repository }}.git DailyJournal",
                "  cd DailyJournal",
                "  echo \"✅ Cloned: $(git log -1 --oneline)\"",
                "fi",
                "",
                "# Build Docker image",
                "echo \"🔨 Building Docker image...\"",
                "cd /home/ubuntu/DailyJournal",
                "docker build -t dailyjournal:latest .",
                "",
                "# Stop and remove old container",
                "echo \"🛑 Stopping old container...\"",
                "docker stop dailyjournal 2>/dev/null || true",
                "docker rm dailyjournal 2>/dev/null || true",
                "",
                "# Run new container",
                "echo \"🚀 Starting new container...\"",
                "docker run -d \\",
                "  --name dailyjournal \\",
                "  --restart always \\",
                "  -p 3000:3000 \\",
                "  --env-file /home/ubuntu/DailyJournal/backend/.env \\",
                "  dailyjournal:latest",
                "",
                "# Wait and verify",
                "sleep 3",
                "if docker ps | grep -q dailyjournal; then",
                "  echo \"✅ Container is running\"",
                "  docker logs --tail 10 dailyjournal",
                "else",
                "  echo \"❌ Container failed to start!\"",
                "  docker logs dailyjournal",
                "  exit 1",
                "fi",
                "",
                "# Restart Nginx",
                "echo \"🔄 Restarting Nginx...\"",
                "sudo systemctl restart nginx",
                "",
                "# Cleanup old images",
                "echo \"🧹 Cleaning up old Docker images...\"",
                "docker image prune -f",
                "",
                "echo \"=========================================\"",
                "echo \"✅ Deployment completed successfully!\"",
                "echo \"=========================================\""
              ]
            }' \
            --comment "Deploy from GitHub Actions" \
            --output text