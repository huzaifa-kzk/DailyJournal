name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/gitkey
          chmod 600 ~/.ssh/gitkey
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 3️⃣ Connect & deploy
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/gitkey ubuntu@${{ secrets.EC2_HOST }} << 'EOF'

          echo "🚀 Connected to EC2"

          # Go to your project folder (actual repo path)
          cd /home/ubuntu/DailyJournal

          # Pull latest code from git
          git reset --hard
          git pull origin main

          # Install backend dependencies
          cd backend
          npm install

          # Restart PM2 process
          pm2 restart dailyjournal || pm2 start app.js --name dailyjournal
          pm2 save

          echo "✅ Deployment finished"
          EOF