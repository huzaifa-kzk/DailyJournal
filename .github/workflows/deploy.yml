name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{
              "commands": [
                "cd /home/ubuntu/DailyJournal",
                "git checkout main",
                "git fetch origin main",
                "git reset --hard origin/main",
                "echo \"📦 Building Docker image...\"",
                "docker build -t dailyjournal:latest .",
                "echo \"🛑 Stopping old container...\"",
                "docker stop dailyjournal || true",
                "docker rm dailyjournal || true",
                "echo \"🚀 Starting new container...\"",
                "docker run -d --name dailyjournal --restart always -p 3000:3000 --env-file backend/.env dailyjournal:latest",
                "echo \"🔄 Restarting Nginx...\"",
                "sudo systemctl restart nginx",
                "echo \"🧹 Cleaning up old images...\"",
                "docker image prune -f",
                "echo \"✅ Deployment complete!\""
              ]
            }' \
            --comment "Deploy from GitHub Actions" \
            --output text