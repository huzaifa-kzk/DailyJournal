name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2 via SSM
        run: |
          # Send command and capture output
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=instanceids,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --parameters '{
              "commands": [
                "#!/bin/bash",
                "set -x",
                "",
                "echo \"=== DEPLOYMENT START ===\"",
                "date",
                "",
                "# Clone or update repository",
                "if [ -d \"/home/ubuntu/DailyJournal/.git\" ]; then",
                "  echo \"Repository exists, updating...\"",
                "  cd /home/ubuntu/DailyJournal",
                "  git checkout main",
                "  git fetch origin main",
                "  git reset --hard origin/main",
                "  git clean -fd",
                "  echo \"Current commit: $(git log -1 --oneline)\"",
                "else",
                "  echo \"Cloning fresh repository...\"",
                "  cd /home/ubuntu",
                "  git clone https://github.com/${{ github.repository }}.git DailyJournal",
                "  cd DailyJournal",
                "  echo \"Current commit: $(git log -1 --oneline)\"",
                "fi",
                "",
                "# Check if code updated",
                "echo \"=== CODE IN DIRECTORY ===\"",
                "ls -la /home/ubuntu/DailyJournal/backend/",
                "",
                "# Build Docker image",
                "echo \"Building Docker image...\"",
                "cd /home/ubuntu/DailyJournal",
                "docker build -t dailyjournal:latest . 2>&1",
                "",
                "# Stop old container",
                "echo \"Stopping old container...\"",
                "docker stop dailyjournal 2>/dev/null || true",
                "docker rm dailyjournal 2>/dev/null || true",
                "",
                "# Run new container",
                "echo \"Starting new container...\"",
                "docker run -d --name dailyjournal --restart always -p 3000:3000 --env-file backend/.env dailyjournal:latest",
                "",
                "# Check container status",
                "sleep 5",
                "docker ps | grep dailyjournal",
                "docker logs --tail 20 dailyjournal",
                "",
                "echo \"=== DEPLOYMENT END ===\""
              ]
            }' \
            --query 'Command.CommandId' \
            --output text)
          
          echo "Command ID: $COMMAND_ID"
          
          # Wait and get output
          sleep 15
          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'StandardOutputContent' \
            --output text