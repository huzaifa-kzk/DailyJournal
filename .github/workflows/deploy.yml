name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/gitkey
          chmod 600 ~/.ssh/gitkey
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/gitkey ubuntu@${{ secrets.EC2_HOST }} '
            cd /home/ubuntu/DailyJournal
            git checkout main
            git fetch origin main
            git reset --hard origin/main
            cd backend
            npm install
            pm2 restart dailyjournal || pm2 start app.js --name dailyjournal
            pm2 save
          '