name: Deploy DailyJournal to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Get target group instances
        id: get-instances
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups --names dailychat-tg --query 'TargetGroups[0].TargetGroupArn' --output text)
          INSTANCE_IDS=$(aws elbv2 describe-target-health --target-group-arn $TG_ARN --query 'TargetHealthDescriptions[].Target.Id' --output text)
          echo "instance_ids=$INSTANCE_IDS" >> $GITHUB_OUTPUT
          echo "Found instances: $INSTANCE_IDS"

      - name: Deploy to EC2 via SSM
        run: |
          for INSTANCE_ID in ${{ steps.get-instances.outputs.instance_ids }}; do
            echo "Deploying to instance: $INSTANCE_ID"
            
            # Send command and capture output
            COMMAND_ID=$(aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --targets "Key=instanceids,Values=$INSTANCE_ID" \
              --parameters '{
                "commands": [
                  "#!/bin/bash",
                  "set -x",
                  "",
                  "# Fix git safe directory",
                  "git config --global --add safe.directory /home/ubuntu/DailyJournal",
                  "",
                  "sudo -u ubuntu bash << 'EOF'",
                  "set -x",
                  "cd /home/ubuntu/DailyJournal",
                  "",
                  "echo \"=== Current commit ===\"",
                  "git log -1 --oneline",
                  "",
                  "echo \"=== Fetching latest ===\"",
                  "git fetch origin main",
                  "git reset --hard origin/main",
                  "git clean -fd",
                  "",
                  "echo \"=== New commit ===\"",
                  "git log -1 --oneline",
                  "",
                  "echo \"=== Building Docker ===\"",
                  "docker build -t dailyjournal:latest .",
                  "",
                  "echo \"=== Stopping old container ===\"",
                  "docker stop dailyjournal 2>/dev/null || echo 'No container to stop'",
                  "docker rm dailyjournal 2>/dev/null || echo 'No container to remove'",
                  "",
                  "echo \"=== Starting new container ===\"",
                  "docker run -d --name dailyjournal --restart always -p 3000:3000 --env-file backend/.env dailyjournal:latest",
                  "",
                  "echo \"=== Container status ===\"",
                  "sleep 3",
                  "docker ps | grep dailyjournal",
                  "EOF",
                  "",
                  "sudo systemctl restart nginx",
                  "docker image prune -f"
                ]
              }' \
              --query 'Command.CommandId' \
              --output text)
            
            echo "Command ID: $COMMAND_ID"
            
            # Wait and show output
            sleep 10
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query 'StandardOutputContent' \
              --output text
          done